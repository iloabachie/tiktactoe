<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2048 Game</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #faf8ef;
}

h1 {
    margin-top: 20px;
}

#score {
    font-size: 20px;
    margin: 10px;
}

#game {
    width: 400px;
    height: 400px;
    background: #bbada0;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 10px;
    padding: 10px;
    border-radius: 10px;
}

.tile {
    background: #cdc1b4;
    border-radius: 5px;
    font-size: 30px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
}

/* Tile colors */
.tile-2 { background: #eee4da; }
.tile-4 { background: #ede0c8; }
.tile-8 { background: #f2b179; color: white; }
.tile-16 { background: #f59563; color: white; }
.tile-32 { background: #f67c5f; color: white; }
.tile-64 { background: #f65e3b; color: white; }
.tile-128 { background: #edcf72; color: white; }
.tile-256 { background: #edcc61; color: white; }
.tile-512 { background: #edc850; color: white; }
.tile-1024 { background: #edc53f; color: white; }
.tile-2048 { background: #edc22e; color: white; }

button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>2048</h1>
<div id="score">Score: 0</div>
<button onclick="restart()">Restart</button>

<div id="game"></div>

<script>
const game = document.getElementById("game");
const scoreDisplay = document.getElementById("score");

let board = [];
let score = 0;

function init() {
    board = Array(4).fill().map(() => Array(4).fill(0));
    score = 0;
    addTile();
    addTile();
    draw();
}

function draw() {
    game.innerHTML = "";
    board.flat().forEach(value => {
        const tile = document.createElement("div");
        tile.className = "tile";
        if (value !== 0) {
            tile.innerText = value;
            tile.classList.add("tile-" + value);
        }
        game.appendChild(tile);
    });
    scoreDisplay.innerText = "Score: " + score;
}

function addTile() {
    let empty = [];
    board.forEach((row, r) => {
        row.forEach((val, c) => {
            if (val === 0) empty.push({r, c});
        });
    });
    if (empty.length === 0) return;

    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
    row = row.filter(val => val);

    for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i + 1]) {
            row[i] *= 2;
            score += row[i];
            row[i + 1] = 0;
        }
    }

    row = row.filter(val => val);
    while (row.length < 4) row.push(0);

    return row;
}

function rotate() {
    board = board[0].map((_, i) =>
        board.map(row => row[i]).reverse()
    );
}

function moveLeft() {
    board = board.map(row => slide([...row]));
}

function moveRight() {
    board = board.map(row => {
        const newRow = slide([...row].reverse());
        return newRow.reverse();
    });
}

function moveUp() {
    rotate();
    moveLeft();
    rotate();
    rotate();
    rotate();
}

function moveDown() {
    rotate();
    moveRight();
    rotate();
    rotate();
    rotate();
}

function handleMove(direction) {
    const oldBoard = JSON.stringify(board);

    if (direction === "left") moveLeft();
    if (direction === "right") moveRight();
    if (direction === "up") moveUp();
    if (direction === "down") moveDown();

    if (oldBoard !== JSON.stringify(board)) {
        addTile();
        draw();
        checkGameOver();
    }
}

function checkGameOver() {
    if (board.flat().includes(0)) return;

    for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
            if (
                board[r][c] === board[r]?.[c + 1] ||
                board[r][c] === board[r + 1]?.[c]
            ) return;
        }
    }

    alert("Game Over!");
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" || e.key === "a") handleMove("left");
    if (e.key === "ArrowRight" || e.key === "d") handleMove("right");
    if (e.key === "ArrowUp" || e.key === "w") handleMove("up");
    if (e.key === "ArrowDown" || e.key === "s") handleMove("down");
});

function restart() {
    init();
}

init();
</script>

</body>
</html>
