<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reaction Speed Game</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #222;
    color: white;
    margin-top: 50px;
}

#gameBox {
    width: 300px;
    height: 200px;
    margin: 40px auto;
    background: red;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    user-select: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 20px;
}

#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>⚡ Reaction Speed Game</h1>
<p>Wait for the box to turn GREEN, then click as fast as you can!</p>

<div id="gameBox">Click Start</div>

<button onclick="startGame()">Start</button>

<div id="result"></div>

<script>
let startTime;
let timeout;
let waiting = false;
let ready = false;
let bestTime = null;

const box = document.getElementById("gameBox");
const result = document.getElementById("result");

function startGame() {
    result.innerText = "";
    box.style.background = "red";
    box.innerText = "Wait...";
    waiting = true;
    ready = false;

    const randomDelay = Math.random() * 3000 + 2000;

    timeout = setTimeout(() => {
        box.style.background = "green";
        box.innerText = "CLICK!";
        startTime = Date.now();
        ready = true;
        waiting = false;
    }, randomDelay);
}

box.addEventListener("click", function() {

    if (waiting) {
        clearTimeout(timeout);
        box.style.background = "red";
        box.innerText = "Too Early!";
        result.innerText = "❌ You clicked too soon!";
        waiting = false;
        return;
    }

    if (ready) {
        const reactionTime = Date.now() - startTime;
        box.style.background = "red";
        box.innerText = "Click Start";
        ready = false;

        if (!bestTime || reactionTime < bestTime) {
            bestTime = reactionTime;
        }

        result.innerHTML = `
            ⚡ Your Time: ${reactionTime} ms <br>
            🏆 Best Time: ${bestTime} ms
        `;
    }
});
</script>

</body>
</html>
