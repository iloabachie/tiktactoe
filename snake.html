<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 { margin-top: 20px; }

#score, #highScore {
    font-size: 18px;
    margin: 5px;
}

canvas {
    background: #222;
    display: block;
    margin: 20px auto;
    border: 3px solid #555;
}

button, select {
    padding: 8px 15px;
    font-size: 14px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>

<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>

<select id="speedSelect">
    <option value="150">Slow</option>
    <option value="100" selected>Normal</option>
    <option value="60">Fast</option>
</select>

<button onclick="restart()">Restart</button>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const speedSelect = document.getElementById("speedSelect");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, direction, nextDirection, food;
let score, highScore;
let gameInterval;
let gameRunning = true;

function init() {
    snake = [{ x: 10, y: 10 }];
    direction = { x: 0, y: 0 };
    nextDirection = { x: 0, y: 0 };
    score = 0;
    gameRunning = true;

    highScore = localStorage.getItem("snakeHighScore") || 0;

    spawnFood();
    updateScore();
    updateHighScore();

    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, speedSelect.value);
}

function spawnFood() {
    while (true) {
        const newFood = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        if (!snake.some(s => s.x === newFood.x && s.y === newFood.y)) {
            food = newFood;
            break;
        }
    }
}

function update() {
    if (!gameRunning) return;

    direction = nextDirection;

    if (direction.x === 0 && direction.y === 0) return;

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // Wall collision
    if (
        head.x < 0 || head.x >= tileCount ||
        head.y < 0 || head.y >= tileCount
    ) {
        gameOver();
        return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        spawnFood();
        updateScore();
    } else {
        snake.pop();
    }
}

function draw() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Snake
    ctx.fillStyle = "#00ff88";
    snake.forEach(segment => {
        ctx.fillRect(
            segment.x * gridSize,
            segment.y * gridSize,
            gridSize - 2,
            gridSize - 2
        );
    });

    // Food
    ctx.fillStyle = "#ff4444";
    ctx.fillRect(
        food.x * gridSize,
        food.y * gridSize,
        gridSize - 2,
        gridSize - 2
    );
}

function gameLoop() {
    update();
    draw();
}

function gameOver() {
    gameRunning = false;
    clearInterval(gameInterval);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("snakeHighScore", highScore);
        updateHighScore();
    }

    alert("Game Over! Final Score: " + score);
}

function updateScore() {
    scoreDisplay.innerText = "Score: " + score;
}

function updateHighScore() {
    highScoreDisplay.innerText = "High Score: " + highScore;
}

document.addEventListener("keydown", e => {
    if (!gameRunning) return;

    if ((e.key === "ArrowUp" || e.key === "w") && direction.y !== 1)
        nextDirection = { x: 0, y: -1 };

    if ((e.key === "ArrowDown" || e.key === "s") && direction.y !== -1)
        nextDirection = { x: 0, y: 1 };

    if ((e.key === "ArrowLeft" || e.key === "a") && direction.x !== 1)
        nextDirection = { x: -1, y: 0 };

    if ((e.key === "ArrowRight" || e.key === "d") && direction.x !== -1)
        nextDirection = { x: 1, y: 0 };
});

speedSelect.addEventListener("change", () => {
    if (gameRunning) {
        clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speedSelect.value);
    }
});

function restart() {
    init();
}

init();
</script>

</body>
</html>
